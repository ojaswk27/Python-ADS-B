# ADS-B multicast network settings
# All four tools read this file as their default values.
# CLI flags (--group, --port, --iface) always override these.

group = 239.255.0.1
port  = 30003
iface = 127.0.0.1

# ASTERIX CAT021 + radar-position output (path_emulator, unicast UDP).
# CLI flags (--asterix-host, --asterix-port) always override these.
asterix_host = 127.0.0.1
asterix_port = 8600
